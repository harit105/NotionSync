name: Sync MongoDB to Notion

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes (UTC)
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync script
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DB_NAME: v6
          COLLECTION: OC-WI-14.01 Culture Transfer
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
        run: |
          test -n "$MONGO_URI" || (echo "Missing MONGO_URI secret" && exit 1)
          test -n "$NOTION_TOKEN" || (echo "Missing NOTION_TOKEN secret" && exit 1)
          test -n "$NOTION_DATA_SOURCE_ID" || (echo "Missing NOTION_DATA_SOURCE_ID secret" && exit 1)
          python sync_script.py
